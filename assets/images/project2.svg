<svg xmlns="http://www.w3.org/2000/svg" width="600" height="360" viewBox="0 0 600 360">
  <rect width="600" height="360" fill="#F0F7FF"/>
  <!-- phone frame -->
  <rect x="210" y="20" width="180" height="320" rx="28" fill="#1A1A18"/>
  <rect x="218" y="30" width="164" height="300" rx="20" fill="#FFFFFF"/>
  <!-- notch -->
  <rect x="260" y="30" width="80" height="18" rx="9" fill="#1A1A18"/>
  <!-- app header -->
  <rect x="218" y="48" width="164" height="52" fill="#2A6EF5"/>
  <text x="300" y="70" font-family="sans-serif" font-weight="700" font-size="13" fill="white" text-anchor="middle">Kesehatan Saya</text>
  <text x="300" y="86" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.7)" text-anchor="middle">Selamat pagi, Andi 👋</text>
  <!-- health ring -->
  <circle cx="300" cy="155" r="44" fill="none" stroke="#EBF1FE" stroke-width="10"/>
  <circle cx="300" cy="155" r="44" fill="none" stroke="#2A6EF5" stroke-width="10" stroke-dasharray="220 277" stroke-linecap="round" transform="rotate(-90 300 155)"/>
  <text x="300" y="151" font-family="sans-serif" font-weight="700" font-size="18" fill="#1A1A18" text-anchor="middle">78%</text>
  <text x="300" y="164" font-family="sans-serif" font-size="8" fill="#9A9A94" text-anchor="middle">Skor Hari Ini</text>
  <!-- mini cards -->
  <rect x="228" y="216" width="68" height="48" rx="10" fill="#EBF1FE"/>
  <text x="262" y="235" font-family="sans-serif" font-weight="700" font-size="13" fill="#2A6EF5" text-anchor="middle">8.2K</text>
  <text x="262" y="249" font-family="sans-serif" font-size="8" fill="#5A5A54" text-anchor="middle">Langkah</text>
  <rect x="302" y="216" width="68" height="48" rx="10" fill="#E8F5E9"/>
  <text x="336" y="235" font-family="sans-serif" font-weight="700" font-size="13" fill="#2E7D32" text-anchor="middle">72bpm</text>
  <text x="336" y="249" font-family="sans-serif" font-size="8" fill="#5A5A54" text-anchor="middle">Detak</text>
  <!-- bottom nav -->
  <rect x="218" y="286" width="164" height="44" fill="#F7F6F2"/>
  <circle cx="258" cy="308" r="10" fill="#2A6EF5" opacity="0.2"/>
  <circle cx="300" cy="308" r="10" fill="none" stroke="#D0D0D0" stroke-width="1.5"/>
  <circle cx="342" cy="308" r="10" fill="none" stroke="#D0D0D0" stroke-width="1.5"/>
  <!-- floating left device shadow -->
  <rect x="60" y="80" width="120" height="200" rx="20" fill="#2A6EF5" opacity="0.08"/>
  <rect x="68" y="88" width="104" height="184" rx="14" fill="#2A6EF5" opacity="0.06"/>
</svg>
